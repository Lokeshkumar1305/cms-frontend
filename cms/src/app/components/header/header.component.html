<mat-toolbar class="shg-header-bar px-3">

  <!-- Left: Sidebar Toggle + Tenant Context -->
  <div class="d-flex align-items-center gap-3">
    <button
      mat-flat-button
      color="primary"
      class="header-toggle-btn"
      (click)="onToggleSidebar()"
      aria-label="Toggle Sidenav"
    >
      <i class="bi bi-list text-white fs-5"></i>
    </button>

  </div>

  <span class="flex-grow-1"></span>

  <!-- Center: Search -->
  <div class="header-search-container d-none d-md-block">
    <mat-form-field appearance="outline" class="header-search-field">
      <i class="bi bi-search" matPrefix></i>
      <input matInput type="text" placeholder="Search bills, products, payments..." />
    </mat-form-field>
  </div>

  <span class="flex-grow-1"></span>

  <!-- Right: Notifications + Profile -->
  <div class="d-flex align-items-center gap-2">

    <button mat-icon-button class="notification-btn position-relative" aria-label="Notifications">
      <i class="bi bi-bell fs-5"></i>
      <span class="notification-badge">3</span>
    </button>

    <!-- Profile trigger -->
    <div class="profile-dropdown-container" [matMenuTriggerFor]="profileMenu">
      <div class="d-flex align-items-center gap-2 cursor-pointer user-profile-trigger">
        <div class="user-avatar d-flex align-items-center justify-content-center text-white">{{ userInitials }}</div>
        <div class="user-info-text d-none d-lg-block text-start">
          <div class="user-name">{{ username }}</div>
          <div class="user-role">Administrator</div>
        </div>
        <i class="bi bi-chevron-down fs-7 d-none d-lg-block"></i>
      </div>
    </div>

    <!-- Profile Dropdown Menu -->
    <mat-menu #profileMenu="matMenu" xPosition="before" class="shg-custom-menu">
      <div class="px-3 py-2 border-bottom user-menu-header">
        <div class="fw-semibold shg-body">{{ username }}</div>
        <div class="shg-caption">{{ userEmail }}</div>
      </div>
      <button mat-menu-item>
        <i class="bi bi-person me-2"></i>
        <span>My Profile</span>
      </button>
      <button mat-menu-item>
        <i class="bi bi-gear me-2"></i>
        <span>Settings</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()" class="text-danger">
        <i class="bi bi-box-arrow-right me-2 text-danger"></i>
        <span>Log Out</span>
      </button>
    </mat-menu>

  </div>
</mat-toolbar>
